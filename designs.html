<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Designs — Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #090705;
            --gold: #c8a96e;
            --white: #f4efe6;
            --muted: rgba(244, 239, 230, 0.42);
            --border: rgba(200, 169, 110, 0.14);
            --card-r: 18px;
            /* card corner radius */
            --card-w: 380px;
            /* card width          */
            --card-h: 260px;
            /* card height         */
            --gap: 32px;
            /* gap between cards   */
            --speed: 70.3s;
            /* marquee duration    */
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 60px;
            background: linear-gradient(to bottom, rgba(9, 7, 5, .96) 0%, transparent 100%);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-family: 'Lora', serif;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: .78rem;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            transition: color .2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        /* ─── HERO HEADER ─── */
        .page-header {
            padding: 148px 60px 60px;
            max-width: 780px;
        }

        .eyebrow {
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeUp .7s ease forwards .1s;
        }

        .page-header h1 {
            font-family: 'Lora', serif;
            font-size: clamp(2.8rem, 5.5vw, 5rem);
            font-weight: 300;
            line-height: 1.06;
            letter-spacing: -.01em;
            opacity: 0;
            animation: fadeUp .7s ease forwards .25s;
        }

        .page-header h1 em {
            font-style: italic;
            color: var(--gold);
        }

        .page-header p {
            margin-top: 20px;
            font-size: .92rem;
            line-height: 1.78;
            color: var(--muted);
            max-width: 430px;
            opacity: 0;
            animation: fadeUp .7s ease forwards .4s;
        }

        /* ─── DIVIDER ─── */
        .h-rule {
            margin: 0 60px;
            height: 1px;
            background: var(--border);
            opacity: 0;
            animation: fadeUp .5s ease forwards .55s;
        }

        /* ─── SECTION LABEL ─── */
        .section-label {
            padding: 52px 60px 36px;
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            animation: fadeUp .6s ease forwards .65s;
        }

        .section-label .line {
            flex: 0 0 36px;
            height: 1px;
            background: var(--gold);
            opacity: .5;
        }

        .section-label span {
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ══════════════════════════════════════
       MARQUEE STRIP
    ══════════════════════════════════════ */
        .marquee-outer {
            width: 100%;
            overflow: hidden;
            padding: 0 0 60px;
            /* slight perspective so cards look like they curve slightly */
            perspective: 1200px;
            opacity: 0;
            animation: fadeUp .7s ease forwards .8s;
        }

        /* The scrolling track — duplicated cards inside */
        .marquee-track {
            display: flex;
            gap: var(--gap);
            width: max-content;
            animation: slide var(--speed) linear infinite;
            /* pause when anything inside is hovered */
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        /* left-to-right: start at -50% (second copy visible) → 0 (first copy visible) */
        @keyframes slide {
            from {
                transform: translateX(-50%);
            }

            to {
                transform: translateX(0);
            }
        }

        /* ─── PROJECT CARD ─── */
        .project-card {
            flex: 0 0 var(--card-w);
            height: var(--card-h);
            border-radius: var(--card-r);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            box-shadow: 0 12px 48px rgba(0, 0, 0, .55), 0 0 0 1px var(--border);
            transition: transform .55s cubic-bezier(.25, 0, .15, 1),
                box-shadow .55s ease;
            /* subtle rotateY for the "curve" feel */
            transform: rotateY(-3deg) scale(1);
            transform-origin: center center;
        }

        .project-card:hover {
            transform: rotateY(0deg) scale(1.06);
            box-shadow: 0 24px 64px rgba(0, 0, 0, .7),
                0 0 0 1.5px rgba(200, 169, 110, .4);
            z-index: 10;
        }

        /* Cover image */
        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .6s cubic-bezier(.25, 0, .15, 1);
            filter: brightness(.88) saturate(1.1);
        }

        .project-card:hover img {
            transform: scale(1.08);
            filter: brightness(1) saturate(1.15);
        }

        /* Bottom info overlay */
        .card-info {
            position: absolute;
            inset: auto 0 0 0;
            padding: 44px 22px 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, .78) 0%, transparent 100%);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .card-info .title {
            font-family: 'Lora', serif;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: .04em;
            color: #fff;
            line-height: 1.1;
        }

        .card-info .title small {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: .65rem;
            font-weight: 500;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .card-info .views-badge {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--bg);
            background: var(--gold);
            padding: 4px 10px;
            border-radius: 3px;
            white-space: nowrap;
        }

        /* "click to explore" tooltip on hover */
        .card-explore {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(.8);
            background: rgba(9, 7, 5, .85);
            border: 1px solid rgba(200, 169, 110, .5);
            color: var(--gold);
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .16em;
            text-transform: uppercase;
            padding: 9px 18px;
            border-radius: 40px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity .3s ease, transform .3s ease;
            pointer-events: none;
        }

        .project-card:hover .card-explore {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ══════════════════════════════════════
       LIGHTBOX / MODAL
    ══════════════════════════════════════ */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(6, 4, 2, .96);
            backdrop-filter: blur(12px);
            flex-direction: column;
        }

        .lightbox.open {
            display: flex;
        }

        /* Top bar */
        .lb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 52px;
            border-bottom: 1px solid var(--border);
            flex: 0 0 auto;
        }

        .lb-title {
            font-family: 'Lora', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--white);
            letter-spacing: .02em;
        }

        .lb-title small {
            font-family: 'Inter', sans-serif;
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-bottom: 4px;
        }

        .lb-close {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color .2s, border-color .2s;
        }

        .lb-close:hover {
            color: var(--white);
            border-color: var(--gold);
        }

        /* Views grid inside lightbox */
        .lb-body {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 48px 52px;
        }

        .lb-grid {
            display: grid;
            gap: 28px;
            /* auto-fit: 1 col for 1 image, 2 cols for 2+, 3 cols for 3+ */
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        }

        .lb-view {
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
            border: 1px solid var(--border);
        }

        .lb-view img {
            width: 100%;
            display: block;
            object-fit: cover;
            aspect-ratio: 4/3;
            transition: transform .5s ease;
        }

        .lb-view:hover img {
            transform: scale(1.03);
        }

        .lb-view .view-label {
            padding: 14px 18px;
            background: rgba(9, 7, 5, .85);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lb-view .view-label .vname {
            font-family: 'Lora', serif;
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--white);
        }

        .lb-view .view-label .vnum {
            font-size: .62rem;
            font-weight: 600;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── FOOTER ── */
        .page-footer {
            padding: 28px 60px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-footer p {
            font-size: .72rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: rgba(244, 239, 230, .55);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: .74rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--gold);
            text-decoration: none;
            transition: gap .2s;
        }

        .back-link:hover {
            gap: 14px;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav>
        <a href="index.html" class="nav-logo">Studio</a>
        <ul class="nav-links">
            <li><a href="designs.html" class="active">Work</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1>Our <em>Designs</em></h1>
        <p>Every space tells a story — every detail, a verse of its own.</p>
    </div>

    <div class="h-rule"></div>

    <div class="section-label">
        <div class="line"></div>
        <span>Click to Explore</span>
    </div>

    <!-- MARQUEE -->
    <div class="marquee-outer">
        <div class="marquee-track" id="marqueeTrack">
            <!-- cards injected by JS -->
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
        <div class="lb-header">
            <div class="lb-title">
                <small id="lbCategory"></small>
                <span id="lbTitle"></span>
            </div>
            <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
        </div>
        <div class="lb-body">
            <div class="lb-grid" id="lbGrid"></div>
        </div>
    </div>

    <!-- PAGE FOOTER -->
    <footer class="page-footer">
        <p>Gulfeshan Naaz — Interior Design Portfolio</p>
        <a href="index.html" class="back-link">← &nbsp; Back to Home</a>
    </footer>

    <script>
        /* ─────────────────────────────────────

        ───────────────────────────────────── */
        const PROJECTS = [
            {

                cover: 'images/Bathrooms/View 1.png',
                views: [
                    { src: 'images/Bathrooms/View 1.png', label: 'Bathroom — View 1' },

            },

                ]
            },

                id: 'office',

                views: [
                    { src: 'images/Office/View 1.png', label: 'Office — View 1' },
                    { src: 'images/Office/View 2.png', label: 'Office — View 2' },
                    { src: 'images/Office/Waiting Area.png', label: 'Office — Waiting Area' },
                    { src: 'images/Office/Office Lounge 1.png', label: 'Office — Lounge View 1' },
                    { src: 'images/Office/Office 2 Lounge 2.png', label: 'Office — Lounge View 2' },
                    { src: 'images/Office/Office 2 View 1.png', label: 'Office 2 — View 1' },
                    { src: 'images/Office/Office 2 View 2.png', label: 'Office 2 — View 2' },

                ]
            },
            {

                name: 'Residence',
                category: 'Residence · Family Living',

                views: [
                    { src: 'images/Residence/View 1.png', label: 'Residence — View 1' },
                    { src: 'images/Residence/View 2.png', label: 'Residence — View 2' },
                    { src: 'images/Residence/Dining.png', label: 'Residence — Dining' },
                    { src: 'images/Residence/Living.png', label: 'Residence — Living' },
                    { src: 'images/Residence/Sons bedroom view 1.png', label: 'Son\'s Bedroom — View 1' },
                    { src: 'images/Residence/Sons bedroom view 2.png', label: 'Son\'s Bedroom — View 2' },

                ]
            },
            {
                id: 'salon',

                views: [
                    { src: 'images/Salon/View 1.png', label: 'Salon — View 1' },

                    { src: 'images/Salon/View 3.png', label: 'Salon — View 3' },
                    { src: 'images/Salon/View 4.png', label: 'Salon — View 4' },
                    { src: 'images/Salon/View 5.png', label: 'Salon — View 5' },
                    { src: 'images/Salon/View 6.png', label: 'Salon — View 6' },
                ]
            },
            {
                id: 'study-room',
                name: 'Study Room',
                category: 'Study Room · Classical Interior',
                cover: 'images/Study Room/View 1.png',
                views: [
                    { src: 'images/Study Room/View 1.png', label: 'Study Room — View 1' },
                    { src: 'images/Study Room/View 2.png', label: 'Study Room — View 2' },
                ]
            },
            {
                id: 'terace',
                name: 'Terrace',
                category: 'Terrace · Outdoor Living',
                cover: 'images/Terace/View 1.png',
                views: [
                    { src: 'images/Terace/View 1.png', label: 'Terrace — View 1' },
                    { src: 'images/Terace/View 2.png', label: 'Terrace — View 2' },
                    { src: 'images/Terace/View 3.png', label: 'Terrace — View 3' },
                    { src: 'images/Terace/View 4.png', label: 'Terrace — View 4' },
                    { src: 'images/Terace/View 5.png', label: 'Terrace — View 5' },
                    { src: 'images/Terace/Pool Side View 1.png', label: 'Pool Side — View 1' },
                    { src: 'images/Terace/Pool Side View 2.png', label: 'Pool Side — View 2' },
                    { src: 'images/Terace/Pool Side View 3.png', label: 'Pool Side — View 3' },
                    { src: 'images/Terace/Pool Side View 4.png', label: 'Pool Side — View 4' },
                ]
            },
        ];

        /* ── Build a single card element ── */
        function makeCard(project) {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', `Open ${project.name} project`);
            card.tabIndex = 0;

            card.innerHTML = `
      <img src="${project.cover}" alt="${project.name} cover" loading="lazy" />
      <div class="card-info">
        <div class="title">
          <small>${project.category}</small>
          ${project.name}
        </div>
        <span class="views-badge">${project.views.length} View${project.views.length > 1 ? 's' : ''}</span>
      </div>
      <div class="card-explore">Click to Explore</div>
    `;

            /* open lightbox on click or Enter */
            const open = () => openLightbox(project);
            card.addEventListener('click', open);
            card.addEventListener('keydown', e => { if (e.key === 'Enter') open(); });

            return card;
        }

        /* ── Populate the marquee (original + duplicate for seamless loop) ── */
        const track = document.getElementById('marqueeTrack');

        function renderTrack() {
            track.innerHTML = '';
            // We need enough cards to fill at least the viewport width twice
            const allProjects = [...PROJECTS];

            // Build one set, then clone it to create the seamless duplicate
            const setA = document.createDocumentFragment();
            const setB = document.createDocumentFragment();

            // Repeat cards enough times to always fill 200vw
            const minCards = Math.ceil((window.innerWidth * 2) /
                (380 + 32)) + 2; // card-w + gap
            const repeatCount = Math.max(2, Math.ceil(minCards / allProjects.length));

            for (let r = 0; r < repeatCount; r++) {
                allProjects.forEach(p => setA.appendChild(makeCard(p)));
            }
            for (let r = 0; r < repeatCount; r++) {
                allProjects.forEach(p => setB.appendChild(makeCard(p)));
            }

            track.appendChild(setA);
            track.appendChild(setB);
        }

        renderTrack();

        /* ── Lightbox ── */
        const lightbox = document.getElementById('lightbox');
        const lbGrid = document.getElementById('lbGrid');
        const lbTitle = document.getElementById('lbTitle');
        const lbCat = document.getElementById('lbCategory');
        const lbClose = document.getElementById('lbClose');

        function openLightbox(project) {
            lbTitle.textContent = project.name;
            lbCat.textContent = project.category;

            lbGrid.innerHTML = '';
            project.views.forEach((view, i) => {
                const el = document.createElement('div');
                el.className = 'lb-view';
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = `opacity .45s ease ${i * 0.12}s, transform .45s ease ${i * 0.12}s`;
                el.innerHTML = `
        <img src="${view.src}" alt="${view.label}" />
        <div class="view-label">
          <span class="vname">${view.label}</span>
          <span class="vnum">View ${String(i + 1).padStart(2, '0')}</span>
        </div>
      `;
                lbGrid.appendChild(el);
                // Trigger animation next frame
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }));
            });

            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
            lbClose.focus();
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
        }

        lbClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
